version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: news_dashboard_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newspass}
      POSTGRES_DB: ${POSTGRES_DB:-newsdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - news_dashboard_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news_dashboard_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-newsuser}:${POSTGRES_PASSWORD:-newspass}@postgres:5432/${POSTGRES_DB:-newsdb}
      GOOGLE_NEWS_API_KEY: ${GOOGLE_NEWS_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - news_dashboard_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news_dashboard_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - news_dashboard_network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: news_dashboard_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - news_dashboard_network
    profiles:
      - with-nginx

volumes:
  postgres_data:

networks:
  news_dashboard_network:
    driver: bridge
